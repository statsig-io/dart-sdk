name: Release Bot

on:
  pull_request:
    types: [opened, reopened, closed]
    branches: [main]
  release:
    types: [released, prereleased]

jobs:
  run:
    if: startsWith(github.head_ref, 'releases/') || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: statsig-io/statsig-publish-sdk-action@3a52792f16c38188588efe20346b45bf6076f275 # main
        with:
          kong-private-key: ${{ secrets.KONG_GH_APP_PRIVATE_KEY }}
