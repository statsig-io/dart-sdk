name: tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dart-lang/setup-dart@v1.3
        with:
          sdk: 3.0.0
      - name: Run Tests
        run: |
          dart pub get
          # Test files share the SDK's global disk state (failed_events.json,
          # statsig_stable_id), so concurrent suites race against each other.
          dart test --reporter=expanded --concurrency=1
